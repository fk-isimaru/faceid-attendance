<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>顔認証 入室システム</title>
  <script defer src="https://cdnjs.cloudflare.com/ajax/libs/face-api.js/0.22.2/face-api.min.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;700&family=Share+Tech+Mono&display=swap');

    :root {
      --bg: #0a0e17;
      --surface: #111827;
      --border: #1e3a5f;
      --accent: #00d4ff;
      --accent2: #00ff9d;
      --warn: #ff4d6d;
      --text: #e0f0ff;
      --muted: #4a7fa0;
      --scan-line: rgba(0, 212, 255, 0.08);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Noto Sans JP', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* scan lines overlay */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 2px,
        var(--scan-line) 2px,
        var(--scan-line) 4px
      );
      pointer-events: none;
      z-index: 999;
    }

    /* ===== NAV ===== */
    nav {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 20px;
      border-bottom: 1px solid var(--border);
      background: rgba(10,14,23,0.9);
      backdrop-filter: blur(10px);
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .logo {
      font-family: 'Share Tech Mono', monospace;
      font-size: 13px;
      color: var(--accent);
      letter-spacing: 2px;
    }

    .logo span { color: var(--accent2); }

    .tabs {
      display: flex;
      gap: 4px;
    }

    .tab {
      padding: 6px 14px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--muted);
      font-family: 'Noto Sans JP', sans-serif;
      font-size: 12px;
      border-radius: 4px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .tab.active, .tab:hover {
      border-color: var(--accent);
      color: var(--accent);
      background: rgba(0,212,255,0.08);
    }

    /* ===== PAGES ===== */
    .page { display: none; padding: 20px; max-width: 600px; margin: 0 auto; }
    .page.active { display: block; }

    /* ===== STATUS BAR ===== */
    #statusBar {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 14px;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--surface);
      margin-bottom: 16px;
      font-family: 'Share Tech Mono', monospace;
      font-size: 12px;
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--warn);
      flex-shrink: 0;
    }
    .status-dot.ready { background: var(--accent2); animation: pulse 2s infinite; }
    .status-dot.loading { background: var(--accent); animation: blink 0.5s infinite; }

    @keyframes pulse {
      0%,100% { box-shadow: 0 0 4px var(--accent2); }
      50% { box-shadow: 0 0 12px var(--accent2); }
    }
    @keyframes blink { 0%,100% { opacity:1; } 50% { opacity:0.3; } }

    /* ===== CAMERA AREA ===== */
    .cam-wrap {
      position: relative;
      width: 100%;
      aspect-ratio: 4/3;
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
      background: #050810;
      margin-bottom: 16px;
    }

    #video {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transform: scaleX(-1);
    }

    #overlay {
      position: absolute;
      inset: 0;
      pointer-events: none;
    }

    /* corner brackets */
    .cam-wrap::before, .cam-wrap::after {
      content: '';
      position: absolute;
      width: 24px;
      height: 24px;
      z-index: 10;
      pointer-events: none;
    }
    .cam-wrap::before { top: 12px; left: 12px; border-top: 2px solid var(--accent); border-left: 2px solid var(--accent); }
    .cam-wrap::after { bottom: 12px; right: 12px; border-bottom: 2px solid var(--accent); border-right: 2px solid var(--accent); }

    .cam-corners span {
      position: absolute;
      width: 24px;
      height: 24px;
      pointer-events: none;
      z-index: 10;
    }
    .cam-corners span:nth-child(1) { top: 12px; right: 12px; border-top: 2px solid var(--accent); border-right: 2px solid var(--accent); }
    .cam-corners span:nth-child(2) { bottom: 12px; left: 12px; border-bottom: 2px solid var(--accent); border-left: 2px solid var(--accent); }

    /* scan animation */
    .scan-beam {
      position: absolute;
      left: 0; right: 0;
      height: 2px;
      background: linear-gradient(90deg, transparent, var(--accent), transparent);
      animation: scanBeam 3s linear infinite;
      opacity: 0;
      z-index: 5;
    }
    .scan-beam.active { opacity: 1; }
    @keyframes scanBeam {
      0% { top: 0; }
      100% { top: 100%; }
    }

    /* result flash */
    .cam-result {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      font-weight: 700;
      letter-spacing: 2px;
      opacity: 0;
      transition: opacity 0.3s;
      z-index: 20;
    }
    .cam-result.show { opacity: 1; }
    .cam-result.success { background: rgba(0,255,157,0.15); color: var(--accent2); }
    .cam-result.fail { background: rgba(255,77,109,0.15); color: var(--warn); }
    .cam-result .result-icon { font-size: 48px; margin-bottom: 8px; }

    /* ===== BUTTONS ===== */
    .btn {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 8px;
      font-family: 'Noto Sans JP', sans-serif;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.2s;
      letter-spacing: 1px;
    }

    .btn-primary {
      background: linear-gradient(135deg, #0066aa, #00aacc);
      color: white;
      box-shadow: 0 0 20px rgba(0,170,204,0.3);
    }
    .btn-primary:hover { box-shadow: 0 0 30px rgba(0,170,204,0.5); transform: translateY(-1px); }
    .btn-primary:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

    .btn-sm {
      width: auto;
      padding: 8px 16px;
      font-size: 13px;
      border-radius: 6px;
    }

    .btn-danger {
      background: rgba(255,77,109,0.15);
      border: 1px solid var(--warn);
      color: var(--warn);
    }

    .btn-ghost {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--muted);
    }
    .btn-ghost:hover { border-color: var(--accent); color: var(--accent); }

    /* ===== SETTINGS PAGE ===== */
    .section-title {
      font-family: 'Share Tech Mono', monospace;
      font-size: 11px;
      color: var(--accent);
      letter-spacing: 3px;
      text-transform: uppercase;
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .section-title::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 16px;
      margin-bottom: 16px;
    }

    .input-group {
      margin-bottom: 12px;
    }

    label {
      display: block;
      font-size: 12px;
      color: var(--muted);
      margin-bottom: 6px;
      font-family: 'Share Tech Mono', monospace;
    }

    input[type="text"], input[type="url"] {
      width: 100%;
      padding: 10px 12px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      font-family: 'Share Tech Mono', monospace;
      font-size: 13px;
      transition: border-color 0.2s;
    }
    input:focus { outline: none; border-color: var(--accent); }

    /* Members list */
    .member-list { display: flex; flex-direction: column; gap: 8px; }

    .member-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 14px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
    }

    .member-avatar {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      object-fit: cover;
      border: 2px solid var(--border);
    }

    .member-name {
      flex: 1;
      font-size: 14px;
    }

    .member-status {
      font-family: 'Share Tech Mono', monospace;
      font-size: 11px;
      color: var(--accent2);
    }

    /* Add member form */
    .add-member-form {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .photo-preview-wrap {
      width: 100%;
      aspect-ratio: 4/3;
      border: 2px dashed var(--border);
      border-radius: 8px;
      overflow: hidden;
      background: var(--bg);
      position: relative;
      cursor: pointer;
    }

    .photo-preview-wrap:hover { border-color: var(--accent); }

    #registerPreview {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: none;
    }

    .photo-placeholder {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: var(--muted);
      font-size: 13px;
      gap: 8px;
    }
    .photo-placeholder .icon { font-size: 32px; }

    /* ===== LOG PAGE ===== */
    .log-list { display: flex; flex-direction: column; gap: 6px; }

    .log-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 14px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      animation: slideIn 0.3s ease;
    }
    @keyframes slideIn {
      from { opacity: 0; transform: translateX(-10px); }
      to { opacity: 1; transform: translateX(0); }
    }

    .log-time {
      font-family: 'Share Tech Mono', monospace;
      font-size: 11px;
      color: var(--accent);
      min-width: 55px;
    }

    .log-name { flex: 1; font-size: 14px; }

    .log-badge {
      font-size: 10px;
      padding: 2px 8px;
      border-radius: 10px;
      background: rgba(0,255,157,0.1);
      color: var(--accent2);
      border: 1px solid rgba(0,255,157,0.3);
    }

    .empty-state {
      text-align: center;
      padding: 40px 20px;
      color: var(--muted);
      font-size: 13px;
    }

    /* ===== GAS URL card ===== */
    .gas-info {
      font-family: 'Share Tech Mono', monospace;
      font-size: 11px;
      color: var(--muted);
      line-height: 1.8;
    }

    .gas-info a { color: var(--accent); }

    /* toast */
    #toast {
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: var(--surface);
      border: 1px solid var(--accent);
      color: var(--accent);
      padding: 10px 20px;
      border-radius: 20px;
      font-size: 13px;
      font-family: 'Share Tech Mono', monospace;
      opacity: 0;
      transition: all 0.3s;
      z-index: 9999;
      white-space: nowrap;
    }
    #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    /* modal */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.8);
      z-index: 500;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .modal-overlay.open { display: flex; }
    .modal {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 24px;
      width: 100%;
      max-width: 380px;
    }
    .modal h3 { margin-bottom: 16px; font-size: 16px; }

    #regCamWrap {
      position: relative;
      width: 100%;
      aspect-ratio: 4/3;
      border-radius: 8px;
      overflow: hidden;
      margin-bottom: 12px;
      background: #050810;
    }
    #regVideo {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transform: scaleX(-1);
    }

    .modal-btns { display: flex; gap: 8px; }

    /* model download progress */
    #modelProgress {
      font-family: 'Share Tech Mono', monospace;
      font-size: 11px;
      color: var(--muted);
      margin-top: 4px;
    }
    .prog-bar-wrap { height: 3px; background: var(--border); border-radius: 2px; margin-top: 6px; }
    .prog-bar { height: 3px; background: var(--accent); border-radius: 2px; transition: width 0.3s; width: 0%; }
  </style>
</head>
<body>

<nav>
  <div class="logo">FACE<span>ID</span> // 入室管理</div>
  <div class="tabs">
    <button class="tab active" onclick="showPage('recognize')">認証</button>
    <button class="tab" onclick="showPage('members')">メンバー</button>
    <button class="tab" onclick="showPage('log')">記録</button>
    <button class="tab" onclick="showPage('settings')">設定</button>
  </div>
</nav>

<!-- ====== 認証ページ ====== -->
<div class="page active" id="page-recognize">
  <div id="statusBar">
    <div class="status-dot" id="statusDot"></div>
    <span id="statusText">モデルを読み込み中...</span>
  </div>
  <div id="modelProgress">
    <div class="prog-bar-wrap"><div class="prog-bar" id="progBar"></div></div>
  </div>

  <div class="cam-wrap" style="margin-top:12px;">
    <video id="video" autoplay muted playsinline></video>
    <canvas id="overlay"></canvas>
    <div class="cam-corners"><span></span><span></span></div>
    <div class="scan-beam" id="scanBeam"></div>
    <div class="cam-result" id="camResult">
      <div class="result-icon" id="resultIcon"></div>
      <div id="resultName"></div>
    </div>
  </div>

  <button class="btn btn-primary" id="captureBtn" onclick="capture()" disabled>
    📷 &nbsp;顔認証スキャン
  </button>

  <div style="margin-top:12px; text-align:center; font-size:11px; color:var(--muted); font-family:'Share Tech Mono',monospace;">
    登録メンバー: <span id="memberCount">0</span>人
  </div>
</div>

<!-- ====== メンバーページ ====== -->
<div class="page" id="page-members">
  <div class="section-title">登録メンバー</div>

  <div class="member-list" id="memberList">
    <div class="empty-state">メンバーが登録されていません</div>
  </div>

  <div style="margin-top:16px;">
    <button class="btn btn-primary" onclick="openRegModal()">＋ メンバーを追加</button>
  </div>

  <div style="margin-top:8px;">
    <button class="btn btn-ghost btn-sm" onclick="exportMembers()">エクスポート (JSON)</button>
    &nbsp;
    <label class="btn btn-ghost btn-sm" style="display:inline-block;cursor:pointer;">
      インポート (JSON)
      <input type="file" accept=".json" style="display:none" onchange="importMembers(event)">
    </label>
  </div>
</div>

<!-- ====== 記録ページ ====== -->
<div class="page" id="page-log">
  <div class="section-title">入室ログ（本日）</div>
  <div class="log-list" id="logList">
    <div class="empty-state">まだ記録がありません</div>
  </div>
  <div style="margin-top:16px;">
    <button class="btn btn-ghost btn-sm" onclick="clearLog()">ログをクリア</button>
  </div>
</div>

<!-- ====== 設定ページ ====== -->
<div class="page" id="page-settings">
  <div class="section-title">Google スプレッドシート連携</div>
  <div class="card">
    <div class="input-group">
      <label>Google Apps Script Web App URL</label>
      <input type="url" id="gasUrl" placeholder="https://script.google.com/macros/s/.../exec" oninput="saveSettings()">
    </div>
    <div class="gas-info">
      設定方法は付属の <strong>README.md</strong> を参照してください。<br>
      URLを入力すると自動的にスプレッドシートへ記録されます。
    </div>
  </div>

  <div class="section-title">認証設定</div>
  <div class="card">
    <div class="input-group">
      <label>照合しきい値（低いほど厳格）</label>
      <input type="range" id="threshold" min="0.3" max="0.7" step="0.05" value="0.5" oninput="updateThreshold(this.value)" style="width:100%;accent-color:var(--accent);">
      <div style="text-align:right;font-family:'Share Tech Mono',monospace;font-size:12px;color:var(--accent);margin-top:4px;" id="thresholdVal">0.50</div>
    </div>
  </div>

  <div class="section-title">データ管理</div>
  <div class="card">
    <button class="btn btn-danger btn-sm" onclick="resetAll()">⚠ 全データをリセット</button>
  </div>
</div>

<!-- ====== 登録モーダル ====== -->
<div class="modal-overlay" id="regModal">
  <div class="modal">
    <h3>🧑 メンバーを追加</h3>
    <div class="input-group">
      <label>名前</label>
      <input type="text" id="regName" placeholder="山田 太郎">
    </div>
    <div id="regCamWrap">
      <video id="regVideo" autoplay muted playsinline></video>
    </div>
    <div class="modal-btns">
      <button class="btn btn-primary" style="flex:1" onclick="registerFace()">📸 撮影して登録</button>
      <button class="btn btn-ghost btn-sm" onclick="closeRegModal()">キャンセル</button>
    </div>
    <div id="regStatus" style="margin-top:8px;font-size:12px;color:var(--muted);font-family:'Share Tech Mono',monospace;"></div>
  </div>
</div>

<div id="toast"></div>

<script>
// ====== State ======
let members = []; // {name, descriptor: Float32Array}
let log = [];
let modelsLoaded = false;
let recognizing = false;
let threshold = 0.5;
let gasUrl = '';
let regStream = null;

// ====== Storage ======
function save() {
  const data = members.map(m => ({
    name: m.name,
    descriptor: Array.from(m.descriptor)
  }));
  localStorage.setItem('faceid_members', JSON.stringify(data));
}

function load() {
  try {
    const raw = localStorage.getItem('faceid_members');
    if (raw) {
      members = JSON.parse(raw).map(m => ({
        name: m.name,
        descriptor: new Float32Array(m.descriptor)
      }));
    }
    gasUrl = localStorage.getItem('faceid_gas') || '';
    threshold = parseFloat(localStorage.getItem('faceid_threshold') || '0.5');
    log = JSON.parse(localStorage.getItem('faceid_log') || '[]');
    document.getElementById('gasUrl').value = gasUrl;
    document.getElementById('threshold').value = threshold;
    document.getElementById('thresholdVal').textContent = threshold.toFixed(2);
    updateMemberCount();
    renderLog();
    renderMembers();
  } catch(e) { console.error(e); }
}

function saveSettings() {
  gasUrl = document.getElementById('gasUrl').value.trim();
  localStorage.setItem('faceid_gas', gasUrl);
}

function updateThreshold(v) {
  threshold = parseFloat(v);
  document.getElementById('thresholdVal').textContent = threshold.toFixed(2);
  localStorage.setItem('faceid_threshold', threshold);
}

// ====== Model Loading ======
const MODEL_URL = 'https://cdn.jsdelivr.net/gh/vladmandic/face-api@master/model';

async function loadModels() {
  setStatus('loading', 'AIモデルを読み込み中...');
  try {
    const steps = [
      faceapi.nets.ssdMobilenetv1.loadFromUri(MODEL_URL),
      faceapi.nets.faceRecognitionNet.loadFromUri(MODEL_URL),
      faceapi.nets.faceLandmark68Net.loadFromUri(MODEL_URL)
    ];
    let done = 0;
    steps.forEach(p => p.then(() => {
      done++;
      document.getElementById('progBar').style.width = (done/steps.length*100)+'%';
    }));
    await Promise.all(steps);
    modelsLoaded = true;
    setStatus('ready', '準備完了 — スキャンしてください');
    document.getElementById('captureBtn').disabled = false;
    document.getElementById('modelProgress').style.display = 'none';
    startVideo();
  } catch(e) {
    setStatus('error', 'モデル読込エラー — ネット接続を確認してください');
    console.error(e);
  }
}

function setStatus(state, text) {
  const dot = document.getElementById('statusDot');
  dot.className = 'status-dot' + (state === 'ready' ? ' ready' : state === 'loading' ? ' loading' : '');
  document.getElementById('statusText').textContent = text;
}

// ====== Camera ======
async function startVideo() {
  try {
    const stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: 'user', width: { ideal: 640 }, height: { ideal: 480 } }
    });
    document.getElementById('video').srcObject = stream;
  } catch(e) {
    setStatus('error', 'カメラへのアクセスが拒否されました');
  }
}

// ====== Capture & Recognize ======
async function capture() {
  if (!modelsLoaded || recognizing) return;
  if (members.length === 0) { toast('先にメンバーを登録してください'); showPage('members'); return; }

  recognizing = true;
  document.getElementById('captureBtn').disabled = true;
  document.getElementById('scanBeam').classList.add('active');
  setStatus('loading', 'スキャン中...');

  await new Promise(r => setTimeout(r, 800));

  const video = document.getElementById('video');
  const detection = await faceapi
    .detectSingleFace(video, new faceapi.SsdMobilenetv1Options({ minConfidence: 0.5 }))
    .withFaceLandmarks()
    .withFaceDescriptor();

  document.getElementById('scanBeam').classList.remove('active');

  if (!detection) {
    showResult('fail', '✗', '顔を検出できません');
    setStatus('ready', '準備完了 — スキャンしてください');
    recognizing = false;
    document.getElementById('captureBtn').disabled = false;
    return;
  }

  // find best match
  let bestDist = Infinity, bestName = null;
  for (const m of members) {
    const dist = faceapi.euclideanDistance(detection.descriptor, m.descriptor);
    if (dist < bestDist) { bestDist = dist; bestName = m.name; }
  }

  if (bestDist < threshold) {
    showResult('success', '✓', bestName + ' さん');
    setStatus('ready', '✓ ' + bestName + ' — 入室記録済み');
    addLog(bestName);
    sendToGAS(bestName);
  } else {
    showResult('fail', '✗', '認識できません');
    setStatus('ready', '準備完了 — スキャンしてください');
  }

  setTimeout(() => {
    recognizing = false;
    document.getElementById('captureBtn').disabled = false;
  }, 2500);
}

function showResult(type, icon, name) {
  const el = document.getElementById('camResult');
  const res = document.getElementById('resultName');
  document.getElementById('resultIcon').textContent = icon;
  res.textContent = name;
  el.className = 'cam-result show ' + type;
  setTimeout(() => { el.className = 'cam-result'; }, 2500);
}

// ====== Log ======
function addLog(name) {
  const now = new Date();
  const entry = {
    name,
    time: now.toTimeString().slice(0,5),
    date: now.toLocaleDateString('ja-JP')
  };
  log.unshift(entry);
  localStorage.setItem('faceid_log', JSON.stringify(log));
  renderLog();
}

function renderLog() {
  const el = document.getElementById('logList');
  if (log.length === 0) { el.innerHTML = '<div class="empty-state">まだ記録がありません</div>'; return; }
  el.innerHTML = log.map(e => `
    <div class="log-item">
      <div class="log-time">${e.time}</div>
      <div class="log-name">${e.name}</div>
      <div class="log-badge">入室</div>
    </div>
  `).join('');
}

function clearLog() {
  if (!confirm('ログをクリアしますか？')) return;
  log = [];
  localStorage.setItem('faceid_log', '[]');
  renderLog();
}

// ====== Google Apps Script ======
async function sendToGAS(name) {
  if (!gasUrl) return;
  try {
    const now = new Date();
    await fetch(gasUrl, {
      method: 'POST',
      mode: 'no-cors',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        name,
        date: now.toLocaleDateString('ja-JP'),
        time: now.toTimeString().slice(0,8)
      })
    });
  } catch(e) { console.warn('GAS送信エラー', e); }
}

// ====== Register Modal ======
async function openRegModal() {
  if (!modelsLoaded) { toast('モデルが読み込まれていません'); return; }
  document.getElementById('regModal').classList.add('open');
  document.getElementById('regName').value = '';
  document.getElementById('regStatus').textContent = '';
  try {
    regStream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'user' } });
    document.getElementById('regVideo').srcObject = regStream;
  } catch(e) { document.getElementById('regStatus').textContent = 'カメラエラー'; }
}

function closeRegModal() {
  document.getElementById('regModal').classList.remove('open');
  if (regStream) { regStream.getTracks().forEach(t => t.stop()); regStream = null; }
}

async function registerFace() {
  const name = document.getElementById('regName').value.trim();
  if (!name) { document.getElementById('regStatus').textContent = '名前を入力してください'; return; }

  document.getElementById('regStatus').textContent = '顔を検出中...';
  const video = document.getElementById('regVideo');
  const detection = await faceapi
    .detectSingleFace(video, new faceapi.SsdMobilenetv1Options({ minConfidence: 0.5 }))
    .withFaceLandmarks()
    .withFaceDescriptor();

  if (!detection) {
    document.getElementById('regStatus').textContent = '顔が検出できませんでした。カメラに顔を向けてください。';
    return;
  }

  members.push({ name, descriptor: detection.descriptor });
  save();
  updateMemberCount();
  renderMembers();
  closeRegModal();
  toast(name + ' を登録しました');
}

// ====== Member List ======
function renderMembers() {
  const el = document.getElementById('memberList');
  if (members.length === 0) { el.innerHTML = '<div class="empty-state">メンバーが登録されていません</div>'; return; }
  el.innerHTML = members.map((m, i) => `
    <div class="member-item">
      <div style="width:36px;height:36px;border-radius:50%;background:var(--border);display:flex;align-items:center;justify-content:center;font-size:16px;">👤</div>
      <div class="member-name">${m.name}</div>
      <button class="btn btn-danger btn-sm" onclick="removeMember(${i})">削除</button>
    </div>
  `).join('');
}

function removeMember(i) {
  if (!confirm(members[i].name + ' を削除しますか？')) return;
  members.splice(i, 1);
  save();
  renderMembers();
  updateMemberCount();
}

function updateMemberCount() {
  document.getElementById('memberCount').textContent = members.length;
}

// ====== Import / Export ======
function exportMembers() {
  const data = members.map(m => ({ name: m.name, descriptor: Array.from(m.descriptor) }));
  const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'faceid_members.json';
  a.click();
}

function importMembers(event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const data = JSON.parse(e.target.result);
      members = data.map(m => ({ name: m.name, descriptor: new Float32Array(m.descriptor) }));
      save();
      renderMembers();
      updateMemberCount();
      toast(members.length + '人のメンバーをインポートしました');
    } catch(err) { toast('インポートエラー: JSONが無効です'); }
  };
  reader.readAsText(file);
  event.target.value = '';
}

// ====== Misc ======
function showPage(id) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.getElementById('page-' + id).classList.add('active');
  event.target.classList.add('active');
}

function resetAll() {
  if (!confirm('全データ（メンバー・ログ・設定）をリセットしますか？')) return;
  localStorage.clear();
  members = []; log = []; gasUrl = ''; threshold = 0.5;
  renderMembers(); renderLog(); updateMemberCount();
  document.getElementById('gasUrl').value = '';
  toast('リセット完了');
}

function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 2500);
}

// ====== Init ======
load();
loadModels();
</script>
